[[scenarios]]
name = "durability-ephemeral"
node = "benchmark-example"
module_name = "benchmark-workload"
reducer_name = "tx_insert_ephemeral"
duration_ms = 20000
warmup_ms = 5000
connections = 4
transport = "persistent"
args_json = ["$client", "$seq", 64, false]
reset_before = true
output = "benchmarks/results/durability-ephemeral.json"

